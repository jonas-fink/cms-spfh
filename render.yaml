services:
  - type: web
    runtime: static
    name: cms-spfh
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # SPA fallback so React Router deep links don't 404 on refresh:
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Build-time API base. Set to the backend URL in the dashboard:
      - key: VITE_API_URL # https://<backend-web-service>.onrender.com
        sync: false
